<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Map — West Midlands</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    #header {
      background: #1a73e8;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    #header h1 { font-size: 18px; font-weight: bold; }

    #stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
    }

    #stats span {
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 12px;
    }

    #map {
      height: calc(100vh - 90px);
      width: 100%;
    }

    #legend {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 13px;
      line-height: 1.8;
      min-width: 160px;
    }

    #legend h4 {
      margin-bottom: 6px;
      font-size: 14px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
  </style>
</head>

<div id="header">
